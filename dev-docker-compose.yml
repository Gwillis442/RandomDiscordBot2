services:
  discord-bot:
    image: ghcr.io/gwillis442/randomdiscordbot2-dev:dev
    pull_policy: always
    container_name: randomdiscordbot2-dev
    restart: unless-stopped
    command: ["python", "-u", "main.py"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN:-}
      discord_token: ${discord_token:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      gptApiKey: ${gptApiKey:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PYTHONUNBUFFERED: "1"
